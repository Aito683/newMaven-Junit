<!DOCTYPE html>

<html>
  <head><title>wedevx.co</title>
</head>
<body>
<h1>WEDEVX.co</h1>
<h2>Registration Form</h2>
<h3>Privacy</h3>

<form>
    <label id="name">Name:</label>
    <input type="text" id="nameTxtBox">
    <br>
    <br>

    <label id="email">Email:</label>
    <input type="email" id="emailInput">

    <br>
    <br>
    <label name="genderGroup" id="gender">Gender:</label>
    <input name="genderGroup" type="radio">
    <label>Male</label>

    <input name="genderGroup" type="radio">
    <label>Female</label>

    <input name="genderGroup" type="radio">
    <label>Other</label>
    <br>
    <br>

    <label id="subscribe">Subscribe</label>
    <input type="checkbox">

    <br>
    <br>
    <label>Country:</label>
    <select id="country">
        <!--values heavily used by developers-->
        <option value="usa">United States</option>
        <option value="ca">Canada</option>
        <option value="uk">United Kingdom</option>
    </select>

    <br>
    <br>

    <input type="submit" value="Submit">
    <!-- the value is the text of this button-->



</form>
</body>
</html>
